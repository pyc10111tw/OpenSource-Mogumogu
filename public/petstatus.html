<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoguMogu Pet Status</title>
    <link rel="stylesheet" href="petstatus.css">
</head>
<body>
    <div id="petStatusContainer">
        <div id="petStatusTitle">Pet Status!</div>
        <div id="petStatusBox">
            <div id="petHealthContainer">
                <!-- this is ducky -->
                <div id="petImageContainer">
                    <img id="petSize" src="/public/assets/images/duckpet.png">
                    <p id="petName">Ducky!</p>
                </div>
                <!-- this is the health status -->
                <div id="healthBarContainer">
                    <div id="healthBarContents">
                        <p>Health Bar:</p>
                        <div id="healthBarDisplay">
                            <div id="healthBar"></div>
                            <div style="font-size: 15px; margin-left: 5px;" id="healthPercentage">100%</div>

                    </div>
                </div>
            </div>
            <div id="petHealthGuide">
                <div id="happyStatus">
                    <img class="reactionImage" src="/public/assets/images/happyStatus.png">
                </div>
                <div id="goodStatus">
                    <img class="reactionImage" src="/public/assets/images/goodStatus.png">
                </div>
                <div id="hungryStatus">
                    <img class="reactionImage" src="/public/assets/images/hungryStatus.png">
                </div>
                <div id="criticalStatus">
                    <img class="reactionImage" src="/public/assets/images/criticalStatus.png">
                </div>
            </div>
        </div>
    </div>
