<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoguMogu Log a Meal</title>
    <link rel="stylesheet" href="logmeal.css">
</head>
<body>
    <div id="logMealContainer">
        <div id="logMealTitle">Log a Meal</div>
        <div id="logMealBox">
            <div id="buttonContainer">
                <button class="uploadButtons">Camera</button>
                <button class="uploadButtons">Upload</button>
            </div>
            <div id="mealDate">
                <label for="logMealDate">Select Date:</label>
                <input type="date" id="logMealDate" name="log-meal">   <!-- to make the calendar date input-->
            </div>
            <div id="mealType">
                <label for="Meal Type">Meal Type:</label>
                <select name="mealType" id="meals"> <!-- to make the dropdown list -->
                    <option value="Breakfast">Breakfast</option>
                    <option value="Lunch">Lunch</option>
                    <option value="Dinner">Dinner</option>
                    <option value="Snack">Snack</option>
                </select>  
            </div>
            <div id="mealNotes">
                <form>
                    <label for="notes">Notes:</label>
                    <input type="text" id="notes">  <!-- to make the input text -->
                </form>
            </div>
            <div id="submitButton"><button type="submit" id="submitButton">Save Meal</button></div>
        </div>
    </div>
</body>
</html>
